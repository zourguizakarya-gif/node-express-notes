<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Notes App</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh;padding:2rem 1rem}
    .container{max-width:700px;margin:0 auto}

    h1{font-size:1.6rem;font-weight:700;margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}

    /* Form */
    .form{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;display:flex;flex-direction:column;gap:.75rem}
    .form input,.form textarea{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:.6rem .85rem;font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
    .form input:focus,.form textarea:focus{border-color:#6366f1}
    .form textarea{resize:vertical;min-height:70px}
    .form-row{display:flex;gap:.75rem;align-items:center}
    .color-pick{display:flex;gap:.5rem}
    .color-pick span{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
    .color-pick span.active{border-color:#6366f1;transform:scale(1.2)}
    .btn{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:.6rem 1.2rem;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s}
    .btn:hover{background:#4f46e5}
    .btn-sm{font-size:.78rem;padding:.35rem .75rem;border-radius:6px}
    .btn-del{background:#fee2e2;color:#dc2626}
    .btn-del:hover{background:#fecaca}

    /* Search */
    .search-bar{display:flex;gap:.6rem;margin-bottom:1rem}
    .search-bar input{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:.55rem .85rem;font-family:'Cairo',sans-serif;font-size:.9rem;outline:none}
    .search-bar input:focus{border-color:#6366f1}

    /* Notes grid */
    .notes{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:500px){.notes{grid-template-columns:1fr}}
    .note{border-radius:10px;padding:1rem;border:1px solid #e2e8f0;position:relative;transition:.2s}
    .note:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
    .note h3{font-size:.95rem;font-weight:600;margin-bottom:.4rem}
    .note p{font-size:.82rem;color:#64748b;line-height:1.5}
    .note-actions{display:flex;gap:.4rem;margin-top:.75rem}
    .note-date{font-size:.7rem;color:#94a3b8;margin-top:.4rem}
    .empty{text-align:center;color:#94a3b8;padding:2.5rem;font-size:.9rem}

    /* Concept tags */
    .concept{display:inline-block;font-size:.65rem;padding:.15rem .45rem;border-radius:4px;background:#ede9fe;color:#6d28d9;font-weight:600;margin-left:.3rem}
  </style>
</head>
<body>
<div class="container">

  <h1>📝 تطبيق الملاحظات</h1>

  <!-- FORM — req.body في POST/PUT -->
  <div class="form">
    <input id="inp-title" type="text" placeholder="عنوان الملاحظة *"/>
    <textarea id="inp-content" placeholder="المحتوى..."></textarea>
    <div class="form-row">
      <div class="color-pick" id="colors">
        <span style="background:#ffffff" data-color="#ffffff" class="active" title="أبيض"></span>
        <span style="background:#fef9c3" data-color="#fef9c3" title="أصفر"></span>
        <span style="background:#dcfce7" data-color="#dcfce7" title="أخضر"></span>
        <span style="background:#e0f2fe" data-color="#e0f2fe" title="أزرق"></span>
        <span style="background:#fce7f3" data-color="#fce7f3" title="وردي"></span>
      </div>
      <button class="btn" onclick="saveNote()">حفظ</button>
    </div>
  </div>

  <!-- SEARCH — req.query -->
  <div class="search-bar">
    <input id="inp-search" type="text" placeholder="بحث... (req.query ?search=)"/>
    <button class="btn" onclick="loadNotes()">🔍</button>
    <button class="btn" style="background:#e2e8f0;color:#475569" onclick="document.getElementById('inp-search').value='';loadNotes()">×</button>
  </div>

  <div class="notes" id="notes-grid">
    <div class="empty">جاري التحميل...</div>
  </div>

</div>

<script>
// ====================================
// الحالة الداخلية
// ====================================
let editId    = null;   // null = إضافة، رقم = تعديل
let noteColor = "#ffffff";

// ====================================
// تحديد اللون — مثال Destructuring من dataset
// ====================================
document.getElementById("colors").addEventListener("click", (e) => {
  const span = e.target.closest("span");
  if (!span) return;
  // Destructuring من dataset
  const { color } = span.dataset;
  noteColor = color;
  document.querySelectorAll("#colors span").forEach(s => s.classList.remove("active"));
  span.classList.add("active");
});

// ====================================
// loadNotes — GET /api/notes?search=...
// req.query مُطبَّق هنا من جهة الـ client
// ====================================
async function loadNotes() {
  const search = document.getElementById("inp-search").value.trim();
  // نبني الـ Query String إذا وُجد بحث
  const url = search ? `/api/notes?search=${encodeURIComponent(search)}` : "/api/notes";

  const res  = await fetch(url);
  const json = await res.json();

  // Destructuring من جسم الرد
  const { data } = json;

  const grid = document.getElementById("notes-grid"); 

  if (!data.length) {
    grid.innerHTML = `<div class="empty">لا توجد ملاحظات</div>`;
    return;
  }

  // filter() — فلترة المصفوفة (مثال: نعرض فقط الملاحظات التي لها محتوى)
  const withContent = data.filter(n => n.content);
  const noContent   = data.filter(n => !n.content);
  const sorted      = [...withContent, ...noContent]; // Spread لدمج مصفوفتين

  grid.innerHTML = sorted.map(note => {
    // Destructuring من كل ملاحظة
    const { id, title, content, color, created_at } = note;
    const date = new Date(created_at).toLocaleDateString("ar-DZ");
    return `
      <div class="note" style="background:${color}">
        <h3>${title}</h3>
        <p>${content || "—"}</p>
        <div class="note-date">${date}</div>
        <div class="note-actions">
          <button class="btn btn-sm" onclick="startEdit(${id})">تعديل</button>
          <button class="btn btn-sm btn-del" onclick="deleteNote(${id})">حذف</button>
        </div>
      </div>`;
  }).join("");
}

// ====================================
// saveNote — POST أو PUT
// req.body مُطبَّق هنا (نرسل JSON في body)
// ====================================
async function saveNote() {
  const title   = document.getElementById("inp-title").value.trim();
  const content = document.getElementById("inp-content").value.trim();
  if (!title) return alert("العنوان مطلوب");

  // Spread — نبني الـ body كـ object
  const body = { title, content, color: noteColor };

  const method = editId ? "PUT" : "POST";
  const url    = editId ? `/api/notes/${editId}` : "/api/notes";

  await fetch(url, {
    method,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),   // req.body في السيرفر
  });

  // إعادة التهيئة
  editId = null;
  document.getElementById("inp-title").value   = "";
  document.getElementById("inp-content").value = "";
  document.querySelector(".btn[onclick='saveNote()']").textContent = "حفظ";
  loadNotes();
}

// ====================================
// startEdit — GET /api/notes/:id
// req.params مُطبَّق (الـ id في الرابط)
// ====================================
async function startEdit(id) {
  const res  = await fetch(`/api/notes/${id}`);
  const json = await res.json();

  // Destructuring من الرد
  const { title, content, color } = json.data;

  document.getElementById("inp-title").value   = title;
  document.getElementById("inp-content").value = content || "";
  noteColor = color;

  // find() — نجد الـ span المطابق للون ونفعّله
  const spans = [...document.querySelectorAll("#colors span")];
  spans.forEach(s => s.classList.remove("active"));
  const match = spans.find(s => s.dataset.color === color);
  if (match) match.classList.add("active");

  editId = id;
  document.querySelector(".btn[onclick='saveNote()']").textContent = "تحديث";
  document.getElementById("inp-title").focus();
}

// ====================================
// deleteNote — DELETE /api/notes/:id
// ====================================
async function deleteNote(id) {
  if (!confirm("حذف الملاحظة؟")) return;
  await fetch(`/api/notes/${id}`, { method: "DELETE" });
  loadNotes();
}

// ====================================
// البحث الفوري عند الكتابة
// ====================================
document.getElementById("inp-search").addEventListener("input", loadNotes);

// تحميل أولي
loadNotes();
</script>
</body>
</html>
